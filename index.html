const fmt = (n) => {
  const abs = Math.abs(n);
  const s = n < 0 ? "-" : "";
  if (abs >= 1000000) return `${s}$${(abs/1000000).toFixed(2)}M`;
  if (abs >= 1000)    return `${s}$${(abs/1000).toFixed(0)}K`;
  return `${s}$${abs}`;
};
const fmtUSD = (n) => `USD ${Math.abs(n).toLocaleString("es-AR")}`;
const fmtPct = (n) => `${n > 0 ? "+" : ""}${n.toFixed(2)}%`;

function groupByMonth(data) {
  const map = {};
  data.forEach(d => {
    const parts = d.fecha.split("/");
    const mm = parts[1].padStart(2,"0");
    const yyyy = parts[2];
    const key = `${yyyy}-${mm}`;
    const monthNames = ["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    if (!map[key]) map[key] = { key, label:`${monthNames[parseInt(mm)]} ${yyyy.slice(2)}`, total:0, days:0, wins:0, losses:0 };
    map[key].total += d.neto;
    if (d.neto !== 0) map[key].days++;
    if (d.neto > 0) map[key].wins++;
    if (d.neto < 0) map[key].losses++;
  });
  return Object.values(map).sort((a,b) => a.key.localeCompare(b.key));
}

// Apps Script endpoint - sirve ambas hojas sin CORS
const APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbwO4nl-8tfyiXQ5jq3wtUKbR-u5Sn8ky4_-sMRZp4tRNvb692ysERT6bkX2eYda6Lrn/exec";

async function fetchSheet(sheetName) {
  return new Promise((resolve, reject) => {
    const cbName = "cb_" + sheetName.replace(/\s/g,"_") + "_" + Date.now();
    const url = `${APPS_SCRIPT}?sheet=${encodeURIComponent(sheetName)}&callback=${cbName}`;
    const script = document.createElement("script");
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error("Timeout fetching " + sheetName));
    }, 10000);
    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = (data) => {
      cleanup();
      if (!data || data.length < 20) reject(new Error("Empty: " + sheetName));
      else resolve(data);
    };
    script.onerror = () => { cleanup(); reject(new Error("Script load error: " + sheetName)); };
    script.src = url;
    document.head.appendChild(script);
  });
}

// Split CSV line respecting quoted fields
function parseCSVLine(line) {
  const result = [];
  let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ""; }
    else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

// Clean a cell value: remove quotes, $, %, spaces
function clean(s) {
  return (s||"").replace(/^"|"$/g,"").trim();
}

// Parse Argentine number: "$108.500,00" or "3,52%" or "108500" → float
function parseNum(s) {
  let v = clean(s).replace(/[$%\s]/g,"");
  if (!v || v.includes("DIV") || v === "-") return 0;
  // If has comma AND dot: "108.500,00" → dot=thousands, comma=decimal
  if (v.includes(".") && v.includes(",")) {
    v = v.replace(/\./g,"").replace(",",".");
  } else if (v.includes(",") && !v.includes(".")) {
    // "3,52" → "3.52"
    v = v.replace(",",".");
  }
  // else already like "108500" or "3.52"
  return parseFloat(v) || 0;
}

// Parse USD sheet (Apps Script returns all cells as strings with quotes)
// Row structure: A=nota, B=mes_o_year, C=usd, D=dif, E=pct
function parseUSDcsv(text) {
  const lines = text.split("\n").filter(l=>l.trim()).map(parseCSVLine);
  const result = [];
  const mesMap = {enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,
                  julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12};
  const mesLabel = ["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  let year = null;

  for (const row of lines) {
    const b = clean(row[1]).toLowerCase();
    const cVal = clean(row[2]);

    // Year row: col B is "2023", "2024" etc
    if (/^202\d$/.test(b)) { year = parseInt(b); continue; }
    if (!year) continue;

    const mm = mesMap[b];
    if (!mm) continue;

    const usd = parseNum(cVal);
    if (usd === 0) continue;

    // Col D: dif. May be a date string from Sheets if it was a date cell — skip those
    const dRaw = clean(row[3]);
    const dif = (dRaw.includes("GMT") || dRaw.length > 20) ? 0 : parseNum(dRaw);

    const pRaw = clean(row[4]);
    const pct = (pRaw.includes("DIV") || pRaw.includes("GMT")) ? 0 : parseNum(pRaw);

    const nota = clean(row[0]) || null;
    const id = `${year}-${String(mm).padStart(2,"0")}`;
    const label = `${mesLabel[mm]} ${String(year).slice(2)}`;
    result.push({ id, label, usd, dif, pct, nota });
  }
  return result;
}

// Parse scalping sheet
// Row: A=fecha(date object→string), B=dia, C=neto, D=vn, E=?, F=nota
function parseScalpCSV(text) {
  const lines = text.split("\n").filter(l=>l.trim()).map(parseCSVLine);
  const result = [];
  for (const row of lines) {
    let fecha = clean(row[0]);
    // Apps Script serializes dates as "Thu Jan 25 2024 00:00:00 GMT-0300..."
    // Convert to DD/MM/YYYY
    if (fecha.includes("GMT") || fecha.match(/^[A-Za-z]{3}\s/)) {
      const d = new Date(fecha);
      if (!isNaN(d)) {
        fecha = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
      } else continue;
    }
    if (!fecha || !/\d{1,2}\/\d{1,2}\/\d{4}/.test(fecha)) continue;
    const neto = parseNum(clean(row[2]));
    const vn   = parseNum(clean(row[3]));
    const nota = clean(row[5]) || null;
    result.push({ fecha, neto, vn, nota });
  }
  return result;
}

function ProyTab({ pnUSD, allMensual, scalpMonthly }) {

  const histByYear = useMemo(() => {
    const map = {};
    allMensual.forEach(d => {
      const y = d.id.slice(0,4);
      if (!map[y]) map[y] = [];
      if (d.pct !== 0) map[y].push(d.pct);
    });
    return Object.entries(map).map(([year, vals]) => ({
      year,
      avg: vals.reduce((a,b)=>a+b,0)/vals.length,
      total: vals.reduce((a,b)=>a+b,0),
      months: vals.length,
    }));
  }, [allMensual]);

  const globalAvgMonthly = useMemo(() => {
    const all = allMensual.filter(d=>d.pct!==0).map(d=>d.pct);
    return all.reduce((a,b)=>a+b,0)/all.length;
  }, [allMensual]);

  // Scalping monthly avg ARS
  const avgScalpMonthARS = useMemo(() => {
    if (!scalpMonthly.length) return 0;
    const pos = scalpMonthly.filter(m=>m.total>0);
    return pos.length ? pos.reduce((s,m)=>s+m.total,0)/pos.length : 0;
  }, [scalpMonthly]);

  const TC = 1423;

  // User inputs
  const [horizonte,    setHorizonte]    = useState(5);       // años
  const [tasaMensual,  setTasaMensual]  = useState(parseFloat(globalAvgMonthly.toFixed(2)));
  const [scalpUSD,     setScalpUSD]     = useState(Math.round(avgScalpMonthARS / TC));
  const [bjjUSD,       setBjjUSD]       = useState(0);
  const [costoVida,    setCostoVida]    = useState(1200);
  const [showScenarios, setShowScenarios] = useState(true);

  // Build monthly projection

    const meses = horizonte * 12;
    const rows = [];
    // 3 scenarios: bear (tasa/2), base (tasa), bull (tasa*1.5)
    let bear = pnUSD, base = pnUSD, bull = pnUSD;
    const ingreso = scalpUSD + bjjUSD;
    const deficit = Math.max(0, costoVida - ingreso);
    for (let i = 1; i <= meses; i++) {
      bear = bear * (1 + (tasaMensual*0.5)/100) - deficit;
      base = base * (1 + tasaMensual/100) - deficit;
      bull = bull * (1 + (tasaMensual*1.5)/100) - deficit;

        base: Math.round(Math.max(0, base)),

      </div>
    </div>

}

function Dashboard() {

  const [liveScalp, setLiveScalp] = useState(scalpingRaw);
  const [loading,   setLoading]   = useState(true);

  useEffect(() => {
    async function fetchAll() {
      setLoading(true);

        log.push("→ Fetching USD...");
        const r1 = await fetchSheet("USD");
        log.push(`✓ USD: ${r1.length} chars, first50: ${r1.slice(0,50).replace(/\n/g," ")}`);

        log.push("→ Fetching scalping al30...");
        const r2 = await fetchSheet("scalping al30");
        log.push(`✓ Scalp: ${r2.length} chars, first50: ${r2.slice(0,50).replace(/\n/g," ")}`);

        const pn = parseUSDcsv(r1);
        log.push(`✓ Parsed PN: ${pn.length} rows`);
        const sc = parseScalpCSV(r2);
        log.push(`✓ Parsed Scalp: ${sc.length} rows`);

        if (pn.length > 0) setLivePN(pn);
        if (sc.length > 0) setLiveScalp(sc);
        setLastUpdate(new Date().toLocaleTimeString("es-AR"));
        log.push("✅ Done");
      } catch(e) {
        log.push("❌ Error: " + e.message);
        setLastUpdate("error");
      }
      setDebugLog(log);
      setLoading(false);
    }
    fetchAll();

  const athLbl  = allMensual.find(d => d.usd === ath)?.label;
  const growth  = (((current.usd - 25000) / 25000) * 100).toFixed(0);
  const winM    = allMensual.filter(d => d.dif > 0).length;
  const lossM   = allMensual.filter(d => d.dif < 0).length;

  const filteredPN = useMemo(() =>
    yearF === "all" ? allMensual : allMensual.filter(d => d.id.startsWith(yearF))

  const totalScalp   = allScalp.reduce((s,d) => s + d.neto, 0);
  const scalpWins    = allScalp.filter(d => d.neto > 0).length;

  const scalpWR      = ((scalpWins/(scalpWins+scalpLoss))*100).toFixed(0);
  const bestDay      = allScalp.reduce((a,b) => b.neto > a.neto ? b : a);

  const scalpMonthly = useMemo(() => groupByMonth(allScalp), [allScalp]);
